name: PopLex
options:
  bundleIdPrefix: com.codex
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: PopLex
targets:
  PopLex:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: PopLex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.poplex
        PRODUCT_NAME: PopLex
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1"
  PopLexMac:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: PopLex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.poplex.mac
        PRODUCT_NAME: PopLex
schemes:
  PopLex:
    build:
      targets:
        PopLex: all
    run:
      config: Debug
  PopLexMac:
    build:
      targets:
        PopLexMac: all
    run:
      config: Debug
